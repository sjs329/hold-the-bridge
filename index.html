<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Canvas Shooter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
    <div id="ui">
      <div id="hud" aria-live="polite">
        <span id="hud-level" class="hud-chip">Lvl 1</span>
        <span id="hud-wave" class="hud-chip">Wave 0</span>
      </div>
      <button id="pause-button" type="button" aria-label="Pause game">II</button>
      <div id="status">Press any key to start</div>
    </div>
  </div>
  <script src="src/core/config.js"></script>
  <script src="src/core/math.js"></script>
  <script src="src/core/geometry.js"></script>
  <script src="src/core/difficulty.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
